name: UXML Certification

on:
  pull_request:
    paths:
      - "viewer/uxml/**"
      - "viewer/tests/uxml-*.test.js"
      - "tools/uxml-certification.mjs"
      - ".github/workflows/uxml-certification.yml"
  push:
    branches:
      - main
    paths:
      - "viewer/uxml/**"
      - "viewer/tests/uxml-*.test.js"
      - "tools/uxml-certification.mjs"
      - ".github/workflows/uxml-certification.yml"
  workflow_dispatch:

jobs:
  certify:
    name: certify
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Install test runner
        shell: bash
        run: |
          set -euo pipefail

          if [ -f package.json ]; then
            echo "package.json found. Installing project dependencies with pnpm."
            pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
          else
            echo "package.json not found. Installing Vitest as temporary CI dependency."
            npm install --no-save vitest
          fi

      - name: Run UXML static certification
        run: node tools/uxml-certification.mjs

      - name: Run UXML Vitest certification
        shell: bash
        run: |
          set -euo pipefail

          if [ -f package.json ]; then
            pnpm vitest run \
              viewer/tests/uxml-contracts.test.js \
              viewer/tests/uxml-profile-detector.test.js \
              viewer/tests/uxml-normalizer.test.js \
              viewer/tests/uxml-validation-gate.test.js \
              viewer/tests/uxml-face-model-builder.test.js \
              viewer/tests/uxml-universal-topo-graph-builder.test.js \
              viewer/tests/uxml-ray-topo-graph-builder.test.js \
              viewer/tests/uxml-topo-graph-comparator.test.js \
              viewer/tests/universal-xml-converter-tab.test.js \
            viewer/tests/rvm-pcf-uxml-topology-bridge.test.js \
            viewer/tests/uxml-topology-decision-gate.test.js
          else
            npx vitest run \
              viewer/tests/uxml-contracts.test.js \
              viewer/tests/uxml-profile-detector.test.js \
              viewer/tests/uxml-normalizer.test.js \
              viewer/tests/uxml-validation-gate.test.js \
              viewer/tests/uxml-face-model-builder.test.js \
              viewer/tests/uxml-universal-topo-graph-builder.test.js \
              viewer/tests/uxml-ray-topo-graph-builder.test.js \
              viewer/tests/uxml-topo-graph-comparator.test.js \
              viewer/tests/universal-xml-converter-tab.test.js \
            viewer/tests/rvm-pcf-uxml-topology-bridge.test.js \
            viewer/tests/uxml-topology-decision-gate.test.js
          fi

      - name: Write certification summary
        if: always()
        shell: bash
        run: |
          {
            echo "## UXML Certification"
            echo ""
            echo "| Gate | Status |"
            echo "|---|---|"
            echo "| Static required-file certification | Completed above |"
            echo "| Vitest UXML suite | Completed above |"
            echo ""
            echo "Expected when green:"
            echo ""
            echo '```text'
            echo "Summary"
            echo "Certification: ✅ PASS"
            echo "Required modules: ✅ 13 / 13"
            echo "Required tests: ✅ 11 / 11"
            echo "Vitest: ✅ PASS"
            echo "Other: 0 skip expected"
            echo "Annotations: 0 errors and 0 warnings"
            echo "certify"
            echo "Process completed with exit code 0"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"